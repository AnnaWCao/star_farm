<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Farm</title>

    <script src="https://unpkg.com/jspsych@8.0.0"></script>
    <link href="https://unpkg.com/jspsych@8.0.0/css/jspsych.css" rel="stylesheet" type="text/css" />
    <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe"></script>

    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-video-button-response@2.1.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@2.1.0"></script>

    <script src="config/functions.js"></script>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body></body>
<script>

var jsPsych = initJsPsych({
    //on_finish: function() {
        
    //}
});

const FUNCTION_BY_NUMBER = {
    1: 'positive_linear',
    2: 'negative_linear',
    3: 'quadratic',
    4: 'exponential_growth'
};

// STARTUP FORM
// Before the experiment runs, the experimenter enters PID / age / function #.
// URL query params (?pid=...&age=...&fn=...) auto-fill the form for quick reruns.
document.body.innerHTML = `
    <div style="max-width:min(900px, 92vw); margin:80px auto; padding:48px;
                background:white; border-radius:14px;
                box-shadow:0 4px 14px rgba(0,0,0,0.12);
                font-family:-apple-system,sans-serif;">
        <h2 style="font-size:30px; margin:0 0 8px;">Star Farm — Session Setup</h2>
        <p style="color:#666; font-size:18px; margin:0 0 20px;">Experimenter only.</p>

        <div style="margin:24px 0;">
            <label style="display:block; font-weight:bold; font-size:20px; margin-bottom:8px;">Participant ID:</label>
            <input type="number" id="pid-input" min="1" step="1"
                   style="width:100%; padding:18px; font-size:22px; box-sizing:border-box;
                          border:1px solid #ccc; border-radius:8px;">
        </div>

        <div style="margin:24px 0;">
            <label style="display:block; font-weight:bold; font-size:20px; margin-bottom:8px;">Age (years):</label>
            <input type="number" id="age-input" min="3" max="12" step="0.01"
                   style="width:100%; padding:18px; font-size:22px; box-sizing:border-box;
                          border:1px solid #ccc; border-radius:8px;">
        </div>

        <div style="margin:24px 0;">
            <label style="display:block; font-weight:bold; font-size:20px; margin-bottom:8px;">Function:</label>
            <input type="number" id="function-input" min="1" max="4" step="1"
                   style="width:100%; padding:18px; font-size:22px; box-sizing:border-box;
                          border:1px solid #ccc; border-radius:8px;">
            <div style="font-size:15px; color:#666; margin-top:8px;">
                1-4 
            </div>
        </div>

        <button id="start-btn"
                style="width:100%; padding:20px; font-size:26px; font-weight:bold;
                       background:#27ae60; color:white; border:none; border-radius:10px;
                       cursor:pointer;">
            Start Session
        </button>
        <div id="form-error" style="color:#e74c3c; margin-top:14px; font-size:16px;"></div>
    </div>
`;

var params = new URLSearchParams(window.location.search);
if (params.get('pid')) document.getElementById('pid-input').value      = params.get('pid');
if (params.get('age')) document.getElementById('age-input').value      = params.get('age');
if (params.get('fn'))  document.getElementById('function-input').value = params.get('fn');

document.getElementById('start-btn').addEventListener('click', function() {
    var pid   = parseInt(document.getElementById('pid-input').value);
    var age   = parseFloat(document.getElementById('age-input').value);
    var fnNum = parseInt(document.getElementById('function-input').value);
    var err   = document.getElementById('form-error');

    if (!pid || pid < 1) { err.textContent = 'Enter a valid Participant ID.'; return; }
    if (!age || age < 3 || age > 12) { err.textContent = 'Enter a valid age (3–12).'; return; }
    if (!fnNum || fnNum < 1 || fnNum > 4) {
        err.textContent = 'Enter a Function number (1, 2, 3, or 4).'; return;
    }

    window._pid   = pid;
    window._age   = age;
    window._fnNum = fnNum;

    document.body.innerHTML = '';
    runExperiment(pid, age, fnNum);
});


// MAIN EXPERIMENT
function runExperiment(pid, age, fnNum) {

    var timeline = [];

    const subject_id = jsPsych.randomization.randomID(10);
    const filename = `${subject_id}.csv`;

    jsPsych.data.addProperties({ subject_id: subject_id, pid: pid, age: age, function_number: fnNum });

    // HELPER FUNCTIONS

    // Audio registry — every Audio played through playAudio() is tracked so a
    // single stopAllAudio() can silence everything when a trial advances.
    // Background music uses `new Audio` directly so it's deliberately excluded.
    window._activeAudios = [];
    function playAudio(src) {
        var a = new Audio(src);
        window._activeAudios.push(a);
        a.addEventListener('ended', function() {
            window._activeAudios = window._activeAudios.filter(function(x) { return x !== a; });
        });
        a.play().catch(function() {});
        return a;
    }
    function stopAllAudio() {
        window._activeAudios.forEach(function(a) {
            try { a.pause(); a.currentTime = 0; } catch (e) {}
        });
        window._activeAudios = [];
    }

    // Wire jsPsych's default button group to the bottom-right of the stage.
    // Used by trials that show a "next" button via choices:['next'].
    function positionBtnGrp() {
        var bg = document.getElementById('jspsych-html-button-response-btngroup');
        if (!bg) return;
        // Move into the stage if one exists, so the button rides with the scene.
        var stage = document.querySelector('.stage');
        if (stage && bg.parentElement !== stage) stage.appendChild(bg);
        bg.style.position  = 'absolute';
        bg.style.bottom    = '3%';
        bg.style.right     = '4%';
        bg.style.top       = 'auto';
        bg.style.left      = 'auto';
        bg.style.margin    = '0';
        bg.style.zIndex    = '10';
        bg.style.textAlign = 'right';
    }

    function addBtnSound() {
        var btn = document.querySelector('#jspsych-html-button-response-btngroup [data-choice="0"]');
        if (btn) btn.addEventListener('click', function() {
            stopAllAudio();
            playAudio('assets/audio/button_click.mp3');
        });
    }

    function nextBtnHtml() {
        return '<button class="jspsych-btn stage-btn">' +
               '<img src="assets/images/next_button.png"></button>';
    }



function buildResponseTrial(opts) {
        return {
            type: jsPsychHtmlButtonResponse,
            stimulus:
                '<div class="stage">' +
                    '<img class="stage-bg" src="' + TRAINING_BG + '">' +
                    // Horizontal fertilizer bar (non-interactive; animates in on_load).
                    '<div style="position:absolute;' +
                        'left:'    + FERT_POSITION.fert_left   + ';' +
                        'bottom:'  + FERT_POSITION.fert_bottom + ';' +
                        'width:'   + FERT_POSITION.fert_width  + ';' +
                        'height:'  + FERT_POSITION.fert_height + ';' +
                        'overflow:hidden;pointer-events:none;">' +
                        '<div id="fert-fill" style="position:absolute;top:0;left:0;' +
                            'width:0%;height:100%;' +
                            'background-image:url(\'' + FERTILIZER_IMAGE + '\');' +
                            'background-size:100% 100%;background-repeat:no-repeat;' +
                            'background-position:left center;"></div>' +
                    '</div>' +
                    // Vertical vine bar track (interactive). Uses clip-path to
                    // progressively reveal the vine image from bottom to top.
                    '<div id="vine-bar-track" style="position:absolute;' +
                        'left:'    + BAR_POSITION.bar_left   + ';' +
                        'bottom:'  + BAR_POSITION.bar_bottom + ';' +
                        'width:'   + BAR_POSITION.bar_width  + ';' +
                        'height:'  + BAR_POSITION.bar_height + ';' +
                        'cursor:pointer;touch-action:none;user-select:none;' +
                        '-webkit-user-select:none;overflow:hidden;">' +
                        '<img id="vine-fill" src="' + FILL_IMAGE + '" style="' +
                            'position:absolute;left:0;top:0;width:100%;height:100%;' +
                            'clip-path:inset(100% 0 0 0);pointer-events:none;">' +
                    '</div>' +
                '</div>',
            choices: ['OK'],
            button_html: function() {
                return '<button id="ok-btn" class="jspsych-btn stage-btn" ' +
                       'style="display:none;">' +
                       '<img src="assets/images/ok_button.png"></button>';
            },
            data: {
                task:        opts.task_label,
                input_value: opts.input_value,
                true_output: opts.true_output,
                trial_index: opts.trial_index
            },

            on_load: function() {
                var track    = document.getElementById('vine-bar-track');
                var fill     = document.getElementById('vine-fill');
                var fertFill = document.getElementById('fert-fill');
                var okBtn    = document.getElementById('ok-btn');

                // Move jsPsych's button group into the stage so OK rides with the scene.
                var stage = document.querySelector('.stage');
                var btnGrp = document.getElementById('jspsych-html-button-response-btngroup');
                if (stage && btnGrp && btnGrp.parentElement !== stage) {
                    stage.appendChild(btnGrp);
                    btnGrp.style.position = 'static';
                    btnGrp.style.margin   = '0';
                }

                var hasInteracted = false;
                var responsePct   = 0;
                var responsePx    = 0;
                var firstMoveTs   = null;
                var startTs       = performance.now();

                // ---- Phase A: animate fertilizer bar + play sounds ----
                // 1) Pour-into-bar sound effect
                // 2) Fertilizer bar fills via CSS transition from 0% to input_value%
                // 3) After the pour finishes (~1.1s), play the verbal instruction
                playAudio('assets/audio/fertilizer.mp3');
                setTimeout(function() {
                    if (fertFill) {
                        fertFill.style.transition = 'width 1000ms ease-out';
                        fertFill.style.width = opts.input_value + '%';
                    }
                }, 100);
                setTimeout(function() {
                    playAudio(opts.intro_audio);
                }, 1200);

                // ---- Phase B: drag handler for the vine bar ----
                function updateFill(clientY) {
                    var rect = track.getBoundingClientRect();
                    // clientY is measured from top of viewport, but we want
                    // 0 at the BOTTOM of the bar and rect.height at the TOP.
                    var y = Math.max(0, Math.min(rect.bottom - clientY, rect.height));
                    responsePx  = y;
                    responsePct = (y / rect.height) * 100;
                    // clip-path inset(top right bottom left): shrinking top reveals the image
                    fill.style.clipPath = 'inset(' + (100 - responsePct) + '% 0 0 0)';
                    if (!hasInteracted) {
                        hasInteracted = true;
                        firstMoveTs = performance.now() - startTs;
                        if (okBtn) okBtn.style.display = 'inline-block';
                    }
                }

                var dragging = false;
                track.addEventListener('pointerdown', function(e) {
                    dragging = true;
                    try { track.setPointerCapture(e.pointerId); } catch(err) {}
                    updateFill(e.clientY); e.preventDefault();
                });
                track.addEventListener('pointermove', function(e) {
                    if (!dragging) return;
                    updateFill(e.clientY); e.preventDefault();
                });
                track.addEventListener('pointerup', function(e) {
                    dragging = false;
                    try { track.releasePointerCapture(e.pointerId); } catch(err) {}
                });
                track.addEventListener('pointercancel', function() { dragging = false; });

                // OK click sound (jsPsych handles trial advance itself).
                // Stop any in-flight instruction audio before playing the click.
                if (okBtn) {
                    okBtn.addEventListener('click', function() {
                        stopAllAudio();
                        playAudio('assets/audio/ok_button_click.mp3');
                    });
                }

                // Stash response state for on_finish to merge into trial data.
                window._vineTrialData = {
                    response_pct:      function() { return responsePct; },
                    response_pixels:   function() { return responsePx; },
                    bar_height_pixels: function() { return track.getBoundingClientRect().height; },
                    interacted:        function() { return hasInteracted; },
                    first_move_rt_ms:  function() { return firstMoveTs ? Math.round(firstMoveTs) : null; }
                };
            },

            on_finish: function(data) {
                stopAllAudio();
                if (window._vineTrialData) {
                    data.response_pct      = window._vineTrialData.response_pct();
                    data.response_pixels   = window._vineTrialData.response_pixels();
                    data.bar_height_pixels = window._vineTrialData.bar_height_pixels();
                    data.interacted        = window._vineTrialData.interacted();
                    data.first_move_rt_ms  = window._vineTrialData.first_move_rt_ms();
                    window._vineTrialData  = null;
                    // Pass the participant's guess to the next (feedback) trial
                    // via a global. Cleared in the feedback trial's on_load.
                    window._lastResponsePct = data.response_pct;
                }
            }
        };
    }



    // buildFeedbackTrial(opts)
    function buildFeedbackTrial(opts) {
        return {
            type: jsPsychHtmlButtonResponse,
            stimulus:
                '<div class="stage">' +
                    '<img class="stage-bg" src="' + TRAINING_BG + '">' +
                    // Fertilizer bar: pre-filled at input_value, no animation
                    '<div style="position:absolute;' +
                        'left:'    + FERT_POSITION.fert_left   + ';' +
                        'bottom:'  + FERT_POSITION.fert_bottom + ';' +
                        'width:'   + FERT_POSITION.fert_width  + ';' +
                        'height:'  + FERT_POSITION.fert_height + ';' +
                        'overflow:hidden;pointer-events:none;">' +
                        '<div style="position:absolute;top:0;left:0;' +
                            'width:'  + opts.input_value + '%;height:100%;' +
                            'background-image:url(\'' + FERTILIZER_IMAGE + '\');' +
                            'background-size:100% 100%;background-repeat:no-repeat;' +
                            'background-position:left center;"></div>' +
                    '</div>' +
                    // Vine bar container: holds both the gray guess and the true vine.
                    '<div id="feedback-track" style="position:absolute;' +
                        'left:'    + BAR_POSITION.bar_left   + ';' +
                        'bottom:'  + BAR_POSITION.bar_bottom + ';' +
                        'width:'   + BAR_POSITION.bar_width  + ';' +
                        'height:'  + BAR_POSITION.bar_height + ';' +
                        'overflow:hidden;">' +
                        // Participant's guess (gray, semi-transparent)
                        '<img id="guess-vine" src="' + FILL_IMAGE + '" style="' +
                            'position:absolute;left:0;top:0;width:100%;height:100%;' +
                            'clip-path:inset(100% 0 0 0);' +
                            'opacity:0.45;filter:grayscale(70%);pointer-events:none;">' +
                        // True vine (full-color, grows from 0 to true_output)
                        '<img id="true-vine" src="' + FILL_IMAGE + '" style="' +
                            'position:absolute;left:0;top:0;width:100%;height:100%;' +
                            'clip-path:inset(100% 0 0 0);pointer-events:none;">' +
                        // Red dashed marker line at the participant's guess height.
                        // Negative left/right extends it just past the bar edges.
                        '<div id="fb-marker" style="position:absolute;' +
                            'left:-50%;right:-50%;bottom:0%;height:0;' +
                            'border-top:4px dashed #e74c3c;opacity:0;' +
                            'transition:opacity 300ms ease-in;pointer-events:none;"></div>' +
                    '</div>' +
                '</div>',
            choices: ['next'],
            button_html: function() {
                return '<button id="fb-next-btn" class="jspsych-btn stage-btn" ' +
                       'style="display:none;">' +
                       '<img src="assets/images/next_button.png"></button>';
            },
            data: {
                task:        'feedback',
                input_value: opts.input_value,
                true_output: opts.true_output,
                trial_index: opts.trial_index
            },

            // Closure captures opts.true_output and opts.final_audio at the time
            // the trial is built, so the on_load callback can use them later.
            on_load: (function(trueOutput, finalAudio) {
                return function() {
                    var guessVine = document.getElementById('guess-vine');
                    var trueVine  = document.getElementById('true-vine');
                    var marker    = document.getElementById('fb-marker');
                    var nextBtn   = document.getElementById('fb-next-btn');

                    // Anchor the button group inside the stage.
                    var stage = document.querySelector('.stage');
                    var btnGrp = document.getElementById('jspsych-html-button-response-btngroup');
                    if (stage && btnGrp && btnGrp.parentElement !== stage) {
                        stage.appendChild(btnGrp);
                        btnGrp.style.position = 'static';
                        btnGrp.style.margin   = '0';
                    }

                    // Read participant's guess from previous response trial
                    var responsePct = (typeof window._lastResponsePct === 'number')
                                      ? window._lastResponsePct : 0;

                    // ---- Phase 1: show guess + marker ----
                    // No transition for the initial state — set instantly.
                    guessVine.style.transition = 'none';
                    guessVine.style.clipPath = 'inset(' + (100 - responsePct) + '% 0 0 0)';
                    marker.style.bottom = responsePct + '%';
                    guessVine.offsetHeight;  // force browser repaint before next step

                    // Play Training_2: "Nice guess! Your guess is this red mark here..."
                    playAudio('assets/audio/Training_2.mp3');

                    // Fade in the red dashed marker line over 300ms
                    setTimeout(function() { marker.style.opacity = '1'; }, 300);

                    // ---- Phase 2: grow true vine from 0 to true_output ----
                    // 700ms delay lets the participant register the marker first.
                    setTimeout(function() {
                        trueVine.style.transition = 'clip-path 1200ms ease-out';
                        trueVine.style.clipPath = 'inset(' + (100 - trueOutput) + '% 0 0 0)';
                    }, 700);

                    // ---- Phase 3: play final audio + reveal next button ----
                    // 2200ms = 700ms delay + 1200ms animation + 300ms buffer
                    setTimeout(function() {
                        playAudio(finalAudio);
                        if (nextBtn) {
                            nextBtn.style.display = 'inline-block';
                            nextBtn.addEventListener('click', function() {
                                stopAllAudio();
                                playAudio('assets/audio/button_click.mp3');
                            });
                        }
                        window._lastResponsePct = null;  // clear stash
                    }, 2200);
                };
            })(opts.true_output, opts.final_audio),

            on_finish: function() { stopAllAudio(); }
        };
    }


    // PRELOAD
    var preload = {
        type: jsPsychPreload,
        images: [
            'assets/images/main.jpeg',
            'assets/images/pink_seed_water_marked.jpeg',
            'assets/images/green_seed_water_marked.jpeg',
            'assets/images/brown_seed_fertilizer.jpeg',
            'assets/images/water_bar.png',
            'assets/images/brown_fertilizer_bar.png',
            'assets/images/brown_vine.png',
            'assets/images/next_button.png',
            'assets/images/ok_button.png'
        ],
        audio: [
            'assets/audio/background_music.mp3',
            'assets/audio/button_click.mp3',
            'assets/audio/ok_button_click.mp3',
            'assets/audio/fertilizer.mp3',
            'assets/audio/Training_1.m4a',
            'assets/audio/Training_2.m4a',
            'assets/audio/Training_3.m4a',
            'assets/audio/Training_4.m4a',
            'assets/audio/Training_5.m4a',
            'assets/audio/Training_6.m4a'
        ],
        video: [
            'assets/videos/CFL1_intro2.mp4',
            'assets/videos/CFL1_intro4.mp4',
            'assets/videos/CFL1_intro6.mp4',
            'assets/videos/CFL1_end1.mp4'
        ],
        show_progress_bar: true,
        message: 'Getting the farm ready...',
        continue_after_error: true
    };
    timeline.push(preload);



    // FAMILIARIZATION PHASE

    var intro_1 = {
        type: jsPsychHtmlButtonResponse,
        stimulus: '<div class="stage">' +
                  '<img class="stage-bg" src="assets/images/main.jpeg"></div>',
        choices: ['next'],
        button_html: nextBtnHtml,
        data: { task: 'intro_1' },
        on_load: function() {
            window.bgMusic = new Audio('assets/audio/background_music.mp3');
            window.bgMusic.loop   = true;
            window.bgMusic.volume = 0.4;
            window.bgMusic.play().catch(function() {});
            positionBtnGrp();
            addBtnSound();
        },
        on_finish: function() {
            stopAllAudio();
            if (window.bgMusic) { window.bgMusic.pause(); window.bgMusic = null; }
        }
    };
    timeline.push(intro_1);

    var intro_2 = {
        type: jsPsychVideoButtonResponse,
        stimulus: ['assets/videos/CFL1_intro2.mp4'],
        choices: [],
        trial_ends_after_video: true,
        response_allowed_while_playing: false,
        };
    timeline.push(intro_2);

    var intro_3 = {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
        <div class="stage">
            <img class="stage-bg" src="assets/images/pink_seed_water_marked.jpeg">
            <!-- Interactive water bar overlay; positions are % of background -->
            <div id="water-bar-track" style="
                position: absolute;
                left:   8%;
                right:  15%;
                bottom:  1.25%;
                width:  90%;
                height: 3.8%;
                cursor: pointer;
                touch-action: none;
                user-select: none;
                -webkit-user-select: none;
                overflow: hidden;
                outline: 2px dashed #ff2d2d;
            ">
            <div id="water-fill" style="
                position: absolute;
                top: 0;
                left: 0;
                width: 0%;
                height: 100%;
                background-image: url('assets/images/water_bar.png');
                background-size: 100% 100%;
                background-repeat: no-repeat;
                pointer-events: none;
                "></div>
            </div>
        </div>
    `,
    // OK button starts hidden; revealed after first drag interaction
    choices: ['OK'],
    button_html: function(choice) {
        return `<button id="ok-btn" class="jspsych-btn stage-btn"
                style="display:none;">
                  <img src="assets/images/ok_button.png">
                </button>`;
    },
    data: { task: 'familiarization_water' },
    on_load: function() {
        var track       = document.getElementById('water-bar-track');
        var fill        = document.getElementById('water-fill');
        var okBtn       = document.getElementById('ok-btn');
        var hasInteracted = false;
        var responsePct   = 0;        // 0–100 % of bar filled
        var responsePx    = 0;        // raw pixel width of fill
        var firstMoveTs   = null;
        var startTs       = performance.now();
        // Anchor the button group inside the stage.
        var stage = document.querySelector('.stage');
        var btnGrp = document.getElementById('jspsych-html-button-response-btngroup');
        if (stage && btnGrp && btnGrp.parentElement !== stage) {
            stage.appendChild(btnGrp);
            btnGrp.style.position = 'static';
            btnGrp.style.margin   = '0';
        }
        // Play click sound when OK is pressed; stop in-flight audio.
        if (okBtn) {
            okBtn.addEventListener('click', function() {
                stopAllAudio();
                playAudio('assets/audio/ok_button_click.mp3');
            });
        }
        // Update fill width based on the X coordinate of touch/mouse
        function updateFill(clientX) {
            var rect = track.getBoundingClientRect();
            var x = Math.max(0, Math.min(clientX - rect.left, rect.width));
            fill.style.width = x + 'px';
            responsePx  = x;
            responsePct = (x / rect.width) * 100;
            if (!hasInteracted) {
                hasInteracted = true;
                firstMoveTs = performance.now() - startTs;
                okBtn.style.display = 'inline-block';   // reveal OK
            }
        }
        // Pointer events handle both touch and mouse
        var dragging = false;
        track.addEventListener('pointerdown', function(e) {
            dragging = true;
            try { track.setPointerCapture(e.pointerId); } catch(err) {}
            updateFill(e.clientX);
            e.preventDefault();
        });
        track.addEventListener('pointermove', function(e) {
            if (!dragging) return;
            updateFill(e.clientX);
            e.preventDefault();
        });
        track.addEventListener('pointerup', function(e) {
            dragging = false;
            try { track.releasePointerCapture(e.pointerId); } catch(err) {}
        });
        track.addEventListener('pointercancel', function(e) {
            dragging = false;
        });
        // Stash response details for on_finish to pick up
        window._waterTrialData = {
            getResponse: function() {
                return {
                    response_pct:        responsePct,
                    response_pixels:     responsePx,
                    bar_width_pixels:    track.getBoundingClientRect().width,
                    interacted:          hasInteracted,
                    first_move_rt_ms:    firstMoveTs ? Math.round(firstMoveTs) : null
                };
            }
        };
    },

        on_finish: function(data) {
            stopAllAudio();
            // Pull final response state and merge into trial data
            if (window._waterTrialData) {
                var r = window._waterTrialData.getResponse();
                data.response_pct     = r.response_pct;
                data.response_pixels  = r.response_pixels;
                data.bar_width_pixels = r.bar_width_pixels;
                data.interacted       = r.interacted;
                data.first_move_rt_ms = r.first_move_rt_ms;
                window._waterTrialData = null;
            }
        }
    };
    timeline.push(intro_3);

    var intro_4 = {
        type: jsPsychVideoButtonResponse,
        stimulus: ['assets/videos/CFL1_intro4.mp4'],
        choices: [],
        trial_ends_after_video: true,
        response_allowed_while_playing: false,
        };
    timeline.push(intro_4);


    var intro_5 = {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
        <div class="stage">
            <img class="stage-bg" src="assets/images/green_seed_water_marked.jpeg">
            <!-- Interactive water bar overlay; positions are % of background -->
            <div id="water-bar-track" style="
                position: absolute;
                left:   8%;
                right:  15%;
                bottom:  1.25%;
                width:  90%;
                height: 3.8%;
                cursor: pointer;
                touch-action: none;
                user-select: none;
                -webkit-user-select: none;
                overflow: hidden;
                outline: 2px dashed #ff2d2d;
            ">
            <div id="water-fill" style="
                position: absolute;
                top: 0;
                left: 0;
                width: 0%;
                height: 100%;
                background-image: url('assets/images/water_bar.png');
                background-size: 100% 100%;
                background-repeat: no-repeat;
                pointer-events: none;
                "></div>
            </div>
        </div>
    `,
    // OK button starts hidden; revealed after first drag interaction
    choices: ['OK'],
    button_html: function(choice) {
        return `<button id="ok-btn" class="jspsych-btn stage-btn"
                style="display:none;">
                  <img src="assets/images/ok_button.png">
                </button>`;
    },
    data: { task: 'familiarization_water' },
    on_load: function() {
        var track       = document.getElementById('water-bar-track');
        var fill        = document.getElementById('water-fill');
        var okBtn       = document.getElementById('ok-btn');
        var hasInteracted = false;
        var responsePct   = 0;        // 0–100 % of bar filled
        var responsePx    = 0;        // raw pixel width of fill
        var firstMoveTs   = null;
        var startTs       = performance.now();
        // Anchor the button group inside the stage.
        var stage = document.querySelector('.stage');
        var btnGrp = document.getElementById('jspsych-html-button-response-btngroup');
        if (stage && btnGrp && btnGrp.parentElement !== stage) {
            stage.appendChild(btnGrp);
            btnGrp.style.position = 'static';
            btnGrp.style.margin   = '0';
        }
        // Play click sound when OK is pressed; stop in-flight audio.
        if (okBtn) {
            okBtn.addEventListener('click', function() {
                stopAllAudio();
                playAudio('assets/audio/ok_button_click.mp3');
            });
        }
        // Update fill width based on the X coordinate of touch/mouse
        function updateFill(clientX) {
            var rect = track.getBoundingClientRect();
            var x = Math.max(0, Math.min(clientX - rect.left, rect.width));
            fill.style.width = x + 'px';
            responsePx  = x;
            responsePct = (x / rect.width) * 100;
            if (!hasInteracted) {
                hasInteracted = true;
                firstMoveTs = performance.now() - startTs;
                okBtn.style.display = 'inline-block';   // reveal OK
            }
        }
        // Pointer events handle both touch and mouse
        var dragging = false;
        track.addEventListener('pointerdown', function(e) {
            dragging = true;
            try { track.setPointerCapture(e.pointerId); } catch(err) {}
            updateFill(e.clientX);
            e.preventDefault();
        });
        track.addEventListener('pointermove', function(e) {
            if (!dragging) return;
            updateFill(e.clientX);
            e.preventDefault();
        });
        track.addEventListener('pointerup', function(e) {
            dragging = false;
            try { track.releasePointerCapture(e.pointerId); } catch(err) {}
        });
        track.addEventListener('pointercancel', function(e) {
            dragging = false;
        });
        // Stash response details for on_finish to pick up
        window._waterTrialData = {
            getResponse: function() {
                return {
                    response_pct:        responsePct,
                    response_pixels:     responsePx,
                    bar_width_pixels:    track.getBoundingClientRect().width,
                    interacted:          hasInteracted,
                    first_move_rt_ms:    firstMoveTs ? Math.round(firstMoveTs) : null
                };
            }
        };
    },

        on_finish: function(data) {
            stopAllAudio();
            // Pull final response state and merge into trial data
            if (window._waterTrialData) {
                var r = window._waterTrialData.getResponse();
                data.response_pct     = r.response_pct;
                data.response_pixels  = r.response_pixels;
                data.bar_width_pixels = r.bar_width_pixels;
                data.interacted       = r.interacted;
                data.first_move_rt_ms = r.first_move_rt_ms;
                window._waterTrialData = null;
            }
        }
    };
    timeline.push(intro_5);
    

    var intro_6 = {
        type: jsPsychVideoButtonResponse,
        stimulus: ['assets/videos/CFL1_intro6.mp4'],
        choices: [],
        trial_ends_after_video: true,
        response_allowed_while_playing: false,
        };
    timeline.push(intro_6);



    // TRAINING PHASE
    var TRAINING_BG      = 'assets/images/brown_seed_fertilizer.jpeg';
    var FILL_IMAGE       = 'assets/images/brown_vine.png';
    var FERTILIZER_IMAGE = 'assets/images/brown_fertilizer_bar.png';

    var BAR_POSITION = {           // vertical vine bar (interactive)
        bar_left:   '47%',
        bar_bottom: '9%',
        bar_width:  '5.5%',
        bar_height: '82%'
    };
    var FERT_POSITION = {          // horizontal fertilizer bar (auto-fill)
        fert_left:   '8%',
        fert_bottom: '1.25%',
        fert_width:  '90%',
        fert_height: '3.8%'
    };

    var FN = FUNCTIONS[fnNum];
    if (!FN) { console.error('No function definition for fnNum=' + fnNum); return; }

    for (var i = 0; i < FN.training.inputs.length; i++) {
        timeline.push(buildResponseTrial({
            input_value:  FN.training.inputs[i],
            true_output:  FN.training.outputs[i],
            trial_index:  i + 1,
            task_label:   'training',
            intro_audio:  (i === 0)
                          ? 'assets/audio/Training_1.m4a'
                          : 'assets/audio/Training_4.m4a'
        }));
        timeline.push(buildFeedbackTrial({
            input_value:  FN.training.inputs[i],
            true_output:  FN.training.outputs[i],
            trial_index:  i + 1,
            final_audio:  (i === 0)
                          ? 'assets/audio/Training_3.m4a'
                          : 'assets/audio/Training_5.m4a'
        }));
    }


    // TESTING PHASE
    timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: '<div class="stage">' +
                  '<img class="stage-bg" src="' + TRAINING_BG + '"></div>',
        choices: ['next'],
        button_html: nextBtnHtml,
        data: { task: 'fun_2_testing_intro' },
        on_load: function() {
            playAudio('assets/audio/Training_6.m4a');
            positionBtnGrp();
            addBtnSound();
        },
        on_finish: function() { stopAllAudio(); }
    });

    for (var j = 0; j < FN.testing.inputs.length; j++) {
        timeline.push(buildResponseTrial({
            input_value:  FN.testing.inputs[j],
            true_output:  FN.testing.outputs[j],
            trial_index:  j + 1,
            task_label:   'testing',
            intro_audio:  'assets/audio/Training_4.m4a'
        }));
    }


    // ENDING
    var end_1 = {
        type: jsPsychVideoButtonResponse,
        stimulus: ['assets/videos/CFL1_end1.mp4'],
        choices: [],
        trial_ends_after_video: true,
        response_allowed_while_playing: false,
        };
    timeline.push(end_1);




    var save_data = {
    type: jsPsychPipe,
    action: "save",
    experiment_id: "0PFfezGea2Xb",  
    filename: filename,
    data_string: () => jsPsych.data.get().csv()
};
timeline.push(save_data);



timeline.push({
    type: jsPsychHtmlButtonResponse,
    stimulus: '<div style="padding:60px;text-align:center;font-size:32px;">' +
              '✓ Session complete!<br><br>Data has been saved.</div>',
    choices: ['Done']
});



    jsPsych.run(timeline);
}
</script>
</html>
