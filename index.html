var intro_8 = {
    type: jsPsychHtmlButtonResponse,
    stimulus: `
        <div style="position:fixed; top:0; left:0; width:100vw; height:100vh; margin:0; padding:0;">
            <img src="assets/images/pink_seed_water_marked.jpeg"
                 style="width:100%; height:100%; object-fit:cover;">
            <!-- Interactive water bar overlay; positions are % of background -->
            <div id="water-bar-track" style="
                position: absolute;
                left:   8%;
                right:  15%;
                bottom:  0.5%;
                width:  90%;
                height: 3.8%;
                cursor: pointer;
                touch-action: none;
                user-select: none;
                -webkit-user-select: none;
                overflow: hidden;
            ">
            <div id="water-fill" style="
                position: absolute;
                top: 0;
                left: 0;
                width: 0%;
                height: 100%;
                background-image: url('assets/images/water_bar.png');
                background-size: 100% 100%;
                background-repeat: no-repeat;
                pointer-events: none;
                "></div>
            </div>
        </div>
    `,
    // OK button starts hidden; revealed after first drag interaction
    choices: ['OK'],
    button_html: function(choice) {
        return `<button id="ok-btn" class="jspsych-btn"
                style="display:none; position:fixed; bottom:50px; right:50px;
                       background:none; border:none; padding:0;
                       cursor:pointer; z-index:10;">
                  <img src="assets/images/ok_button.png" style="height:80px;">
                </button>`;
    },
    data: { task: 'familiarization_water' },

    on_load: function() {
        var track       = document.getElementById('water-bar-track');
        var fill        = document.getElementById('water-fill');
        var okBtn       = document.getElementById('ok-btn');

        var hasInteracted = false;
        var responsePct   = 0;        // 0–100 % of bar filled
        var responsePx    = 0;        // raw pixel width of fill
        var firstMoveTs   = null;
        var startTs       = performance.now();

        // Play click sound when OK is pressed
        if (okBtn) {
            okBtn.addEventListener('click', function() {
                new Audio('assets/audio/ok_button_click.mp3').play().catch(function(){});
            });
        }

        // Update fill width based on the X coordinate of touch/mouse
        function updateFill(clientX) {
            var rect = track.getBoundingClientRect();
            var x = Math.max(0, Math.min(clientX - rect.left, rect.width));
            fill.style.width = x + 'px';
            responsePx  = x;
            responsePct = (x / rect.width) * 100;
            if (!hasInteracted) {
                hasInteracted = true;
                firstMoveTs = performance.now() - startTs;
                okBtn.style.display = 'inline-block';   // reveal OK
            }
        }

        // Pointer events handle both touch and mouse
        var dragging = false;
        track.addEventListener('pointerdown', function(e) {
            dragging = true;
            try { track.setPointerCapture(e.pointerId); } catch(err) {}
            updateFill(e.clientX);
            e.preventDefault();
        });
        track.addEventListener('pointermove', function(e) {
            if (!dragging) return;
            updateFill(e.clientX);
            e.preventDefault();
        });
        track.addEventListener('pointerup', function(e) {
            dragging = false;
            try { track.releasePointerCapture(e.pointerId); } catch(err) {}
        });
        track.addEventListener('pointercancel', function(e) {
            dragging = false;
        });

        // Stash response details for on_finish to pick up
        window._waterTrialData = {
            getResponse: function() {
                return {
                    response_pct:        responsePct,
                    response_pixels:     responsePx,
                    bar_width_pixels:    track.getBoundingClientRect().width,
                    interacted:          hasInteracted,
                    first_move_rt_ms:    firstMoveTs ? Math.round(firstMoveTs) : null
                };
            }
        };
    },

    on_finish: function(data) {
        // Pull final response state and merge into trial data
        if (window._waterTrialData) {
            var r = window._waterTrialData.getResponse();
            data.response_pct     = r.response_pct;
            data.response_pixels  = r.response_pixels;
            data.bar_width_pixels = r.bar_width_pixels;
            data.interacted       = r.interacted;
            data.first_move_rt_ms = r.first_move_rt_ms;
            window._waterTrialData = null;
        }
    }
};

// helper function to create a trial with the vine bar response interface
function buildTrial(opts) {
    var fertilizerPct = opts.input_value;
    return {
        type: jsPsychHtmlButtonResponse,
        stimulus: `
            <div style="position:fixed; top:0; left:0; width:100vw; height:100vh; margin:0; padding:0;">
                <img src="assets/images/green_seed_fertilizer.jpeg" style="width:100%; height:100%; object-fit:cover;">
                <!-- HORIZONTAL fertilizer bar (NON-interactive, pre-filled to input_value%) -->
                <div style="
                    position: absolute;
                    left:   ${opts.fert_left   || '8%'};
                    bottom: ${opts.fert_bottom || '0.5%'};
                    width:  ${opts.fert_width  || '90%'};
                    height: ${opts.fert_height || '3.9%'};
                    overflow: hidden;
                    pointer-events: none;
                ">
                    <div style="
                        position: absolute;
                        top: 0;
                        left: 0;
                        width: ${fertilizerPct}%;
                        height: 100%;
                        background-image: url('${opts.fertilizer_image}');
                        background-size: 100% 100%;
                        background-repeat: no-repeat;
                        background-position: left center;
                    "></div>
                </div>
                <!-- Vertical vine bar track: positions are % of viewport -->
                <div id="vine-bar-track" style="
                    position: absolute;
                    left:   ${opts.bar_left   || '47%'};
                    bottom: ${opts.bar_bottom || '10%'};
                    width:  ${opts.bar_width  || '6%'};
                    height: ${opts.bar_height || '70%'};
                    cursor: pointer;
                    touch-action: none;
                    user-select: none;
                    -webkit-user-select: none;
                    overflow: hidden;
                ">
                    <!-- Fill div anchored to BOTTOM, grows upward -->
                    <img id="vine-fill" src="${opts.fill_image}" style="
                        position: absolute;
                        left: 0;
                        top: 0;
                        width: 100%;
                        height: 100%;
                        clip-path: inset(100% 0 0 0);
                        pointer-events: none;
                    "></div>
                </div>
            </div>
        `,
        choices: ['OK'],
        button_html: function(choice) {
            return `<button id="ok-btn" class="jspsych-btn"
                    style="display:none; position:fixed; bottom:50px; right:50px;
                           background:none; border:none; padding:0;
                           cursor:pointer; z-index:10;">
                      <img src="assets/images/ok_button.png" style="height:80px;">
                    </button>`;
        },
        data: {
            task:         opts.trial_label,
            input_value:  opts.input_value,
            true_output:  opts.true_output,
            trial_index:  opts.trial_index
        },
 
        on_load: function() {
            var track = document.getElementById('vine-bar-track');
            var fill  = document.getElementById('vine-fill');
            var okBtn = document.getElementById('ok-btn');
 
            var hasInteracted = false;
            var responsePct   = 0;   // 0–100 % of bar filled
            var responsePx    = 0;   // raw pixel height of fill
            var firstMoveTs   = null;
            var startTs       = performance.now();
 
            if (okBtn) {
                okBtn.addEventListener('click', function() {
                    new Audio('assets/audio/ok_button_click.mp3').play().catch(function(){});
                });
            }
 
            // Update fill HEIGHT based on Y coordinate of touch/mouse
            // (bottom of track = 0%, top of track = 100%)
            function updateFill(clientY) {
               var rect = track.getBoundingClientRect();
                var y = Math.max(0, Math.min(rect.bottom - clientY, rect.height));
                responsePx  = y;
                responsePct = (y / rect.height) * 100;
                // Reveal from bottom up: clip-path inset(top right bottom left)
                // top-clip shrinks from 100% (hidden) to 0% (fully visible)
                fill.style.clipPath = 'inset(' + (100 - responsePct) + '% 0 0 0)';
                if (!hasInteracted) {
                    hasInteracted = true;
                    firstMoveTs = performance.now() - startTs;
                    okBtn.style.display = 'inline-block';
                }
            }
 
            var dragging = false;
            track.addEventListener('pointerdown', function(e) {
                dragging = true;
                try { track.setPointerCapture(e.pointerId); } catch(err) {}
                updateFill(e.clientY);
                e.preventDefault();
            });
            track.addEventListener('pointermove', function(e) {
                if (!dragging) return;
                updateFill(e.clientY);
                e.preventDefault();
            });
            track.addEventListener('pointerup', function(e) {
                dragging = false;
                try { track.releasePointerCapture(e.pointerId); } catch(err) {}
            });
            track.addEventListener('pointercancel', function(e) {
                dragging = false;
            });
 
            window._vineTrialData = {
                getResponse: function() {
                    return {
                        response_pct:      responsePct,
                        response_pixels:   responsePx,
                        bar_height_pixels: track.getBoundingClientRect().height,
                        interacted:        hasInteracted,
                        first_move_rt_ms:  firstMoveTs ? Math.round(firstMoveTs) : null
                    };
                }
            };
        },
 
        on_finish: function(data) {
            if (window._vineTrialData) {
                var r = window._vineTrialData.getResponse();
                data.response_pct      = r.response_pct;
                data.response_pixels   = r.response_pixels;
                data.bar_height_pixels = r.bar_height_pixels;
                data.interacted        = r.interacted;
                data.first_move_rt_ms  = r.first_move_rt_ms;
                window._vineTrialData = null;
                window._lastResponsePct = data.response_pct;
            }
        }
    };
}


// helper function for training feedback
function buildFeedbackTrial(opts) {
    var fertilizerPct = opts.input_value;
    return {
        type: jsPsychHtmlButtonResponse,
        stimulus: `
            <div style="position:fixed; top:0; left:0; width:100vw; height:100vh; margin:0; padding:0;">
                <img src="assets/images/green_seed_fertilizer.jpeg" style="width:100%; height:100%; object-fit:cover;">
                <!-- HORIZONTAL fertilizer bar (locked at input_value) -->
                <div style="
                    position: absolute;
                    left:   8%;
                    right:  15%;
                    bottom:  0.5%;
                    width:  90%;
                    height: 3.8%;
                    overflow: hidden;
                ">
                    <div style="
                        position: absolute;
                        top: 0;
                        left: 0;
                        width: ${fertilizerPct}%;
                        height: 100%;
                        background-image: url('assets/images/green_fertilizer_bar.png');
                        background-size: 100% 100%;
                        background-repeat: no-repeat;
                        background-position: left center;
                    "></div>
                </div>
 
                <!-- VERTICAL vine bar (locked at true_output) -->
                <div id="feedback-track" style="
                    position: absolute;
                    left:   ${opts.bar_left   || '47%'};
                    bottom: ${opts.bar_bottom || '10%'};
                    width:  ${opts.bar_width  || '6%'};
                    height: ${opts.bar_height || '70%'};
                    overflow: hidden;
                ">
                    <!-- Vine fill: starts at participant's response, animates to true_output -->
                    <img id="feedback-fill" src="${opts.fill_image}" style="
                        position: absolute;
                        left: 0;
                        top: 0;
                        width: 100%;
                        height: 100%;
                        clip-path: inset(100% 0 0 0);
                        pointer-events: none;
                    "></div>

                    <!-- Marker line at participant's guess (Option 3) -->
                    <div id="feedback-marker" style="
                        position: absolute;
                        left: -5%;
                        right: -5%;
                        bottom: 0%;
                        height: 0;
                        border-top: 4px dashed #e74c3c;
                        opacity: 0;
                        transition: opacity 400ms ease-in;
                        pointer-events: none;
                    "></div>

                    <!-- Marker label -->
                    <div id="feedback-marker-label" style="
                        position: absolute;
                        right: -120px;
                        bottom: 0%;
                        transform: translateY(50%);
                        background: #e74c3c;
                        color: white;
                        padding: 4px 10px;
                        border-radius: 6px;
                        font-size: 16px;
                        font-weight: bold;
                        opacity: 0;
                        transition: opacity 400ms ease-in;
                        white-space: nowrap;
                        pointer-events: none;
                    ">your guess</div>
                </div>
            </div>
        `,
        choices: [],
        trial_duration: opts.feedback_duration_ms || 3500,
        data: {
            task:         'feedback',
            input_value:  opts.input_value,
            true_output:  opts.true_output,
            trial_index:  opts.trial_index
        },
        on_load: (function(trueOutput) {
            return function() {
            var fill        = document.getElementById('feedback-fill');
            var marker      = document.getElementById('feedback-marker');
            var markerLabel = document.getElementById('feedback-marker-label');

            // Pull participant's response from the previous trial
            var responsePct = (typeof window._lastResponsePct === 'number')
                              ? window._lastResponsePct
                              : 0;

            // Step 1: instantly set fill to participant's response
            fill.style.transition = 'none';
            fill.style.clipPath = 'inset(' + (100 - responsePct) + '% 0 0 0)';

            // Position marker at participant's guess height
            marker.style.bottom = responsePct + '%';
            markerLabel.style.bottom = responsePct + '%';

            // Force browser to paint the initial state before animating
            fill.offsetHeight;

            // Step 2: after a brief pause, fade in the marker and animate fill to truth
            setTimeout(function() {
                marker.style.opacity = '1';
                markerLabel.style.opacity = '1';
            }, 300);

            setTimeout(function() {
                fill.style.transition = 'clip-path 1200ms ease-out';
                fill.style.clipPath = 'inset(' + (100 - trueOutput) + '% 0 0 0)';
            }, 600);

            // Clear stash so it doesn't leak into next trial
            window._lastResponsePct = null;
        };
        })(opts.true_output)
    };
}

// push testing trials, no feedback
for (var j = 0; j < FN.testing.inputs.length; j++) {

}
